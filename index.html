<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminous Tide Prototype</title>
    <link rel="stylesheet" href="styles.css?v=mobile-touch-layout-1" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="tideCanvas" aria-label="努力の蓄積で育つ発光する水面"></canvas>

      <section class="panel intro-panel" aria-label="現在の努力の状態">
        <p class="eyebrow">Luminous Tide</p>
        <h1>
          <span>触れるたび、</span>
          <span>光が目覚める。</span>
        </h1>
        <p class="lead">
          今日の努力を記録すると、水位と光が少しずつ育ちます。
        </p>

        <div class="stats-grid">
          <div>
            <span class="stat-value" id="streakDays">0</span>
            <span class="stat-label">Day</span>
          </div>
          <div>
            <span class="stat-value" id="todayTime">0m</span>
            <span class="stat-label">Today</span>
          </div>
          <div>
            <span class="stat-value" id="totalTime">0m</span>
            <span class="stat-label">Total</span>
          </div>
        </div>
      </section>

      <section class="panel record-panel" aria-label="努力を記録する">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Today's record</p>
            <h2>努力を足す</h2>
          </div>
          <button class="ghost-button" id="tiltButton" type="button">傾きON</button>
        </div>

        <form id="effortForm">
          <fieldset class="category-group">
            <legend>カテゴリ</legend>
            <label>
              <input type="radio" name="category" value="portfolio" checked />
              <span>制作</span>
            </label>
            <label>
              <input type="radio" name="category" value="study" />
              <span>勉強</span>
            </label>
            <label>
              <input type="radio" name="category" value="drawing" />
              <span>デッサン</span>
            </label>
            <label>
              <input type="radio" name="category" value="career" />
              <span>転職準備</span>
            </label>
          </fieldset>

          <div class="duration-row">
            <label for="minutesInput">時間</label>
            <div class="duration-control">
              <input id="minutesInput" name="minutes" type="number" min="5" max="720" step="5" value="30" />
              <span>分</span>
            </div>
          </div>

          <div class="preset-row" aria-label="時間プリセット">
            <button type="button" data-minutes="20">20m</button>
            <button type="button" data-minutes="30">30m</button>
            <button type="button" data-minutes="60">1h</button>
            <button type="button" data-minutes="120">2h</button>
          </div>

          <button class="primary-button" type="submit">記録する</button>
        </form>

        <div class="log-block">
          <div class="log-header">
            <h3>今日の記録</h3>
            <button class="text-button" id="resetButton" type="button">リセット</button>
          </div>
          <ol id="logList" class="log-list"></ol>
        </div>
      </section>

      <section class="hint-bar" aria-label="操作方法">
        <span>ホバーで集光</span>
        <span>ドラッグで流れ</span>
        <span>クリック / タップで波紋</span>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
